name: ⚡ COMPLETE FIXED SINGLE MASTER APK ENGINE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_master_framework:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 1. Checkout Code
        uses: actions/checkout@v4

      - name: ☕ 2. Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 3. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🐘 3.5 Setup Fixed Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5' # 🔥 FIX: Version fixed so it never uses 9.5+

      - name: 🧠 4. Clean & Setup Assets
        run: |
          mkdir -p docs/apks docs/policies
          rm -rf core
          echo "APP_NAME=Universal Mega App Factory" >> $GITHUB_ENV

      - name: 🏗️ 5. Building Real Android Single Master Source
        run: |
          mkdir -p core/app/src/main/java/com/nextgen/masterfactory
          mkdir -p core/app/src/main/res/layout
          mkdir -p core/app/src/main/res/values

          echo "include ':app'" > core/settings.gradle
          
          cat << 'EOF' > core/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' > core/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.nextgen.masterfactory'
              compileSdk 34
              defaultConfig {
                  applicationId "com.factory.single_master_engine"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file("final_master.keystore")
                      storePassword "MasterAdmin2026"
                      keyAlias "master_alias"
                      keyPassword "MasterAdmin2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'com.unity3d.ads:unity-ads:4.9.2'
          }
          EOF

          cat << 'EOF' > core/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.microsoft.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application 
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#1A237E</color></resources>' > core/app/src/main/res/values/colors.xml
          echo '<resources><string name="app_name">Master App Factory</string><style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>' > core/app/src/main/res/values/strings.xml
          
          cat << 'EOF' > core/app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.microsoft.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F5F5F5"
              android:padding="8dp">
              <TextView android:id="@+id/app_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="🌐 MEGA APP FACTORY LIVE" android:textSize="20sp" android:textStyle="bold" android:gravity="center" android:padding="12dp" android:textColor="#1A237E"/>
              <ListView android:id="@+id/apps_listview" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@id/banner_ad_view" android:layout_below="@id/app_title" android:divider="#CCCCCC" android:dividerHeight="1dp"/>
              <FrameLayout android:id="@+id/banner_ad_view" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" />
          </RelativeLayout>
          EOF

          cat << 'EOF' > core/app/src/main/java/com/nextgen/masterfactory/MainActivity.java
          package com.nextgen.masterfactory;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import android.widget.FrameLayout;
          import androidx.appcompat.app.AppCompatActivity;
          import com.unity3d.ads.UnityAds;
          import com.unity3d.ads.IUnityAdsInitializationListener;
          import com.unity3d.services.ads.banner.BannerView;
          import com.unity3d.services.ads.banner.UnityBannerSize;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {
              private BannerView topBannerView;
              private ListView listView;
              private ArrayList<String> appList = new ArrayList<>();
              private ArrayAdapter<String> adapter;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  listView = findViewById(R.id.apps_listview);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, appList);
                  listView.setAdapter(adapter);
                  
                  ExecutorService executor = Executors.newSingleThreadExecutor();
                  Handler handler = new Handler(Looper.getMainLooper());
                  
                  executor.execute(() -> {
                      String result = null;
                      try {
                          URL url = new URL("https://videodeno860-afk.github.io/my-app-factory/apps_feed.json");
                          BufferedReader reader = new BufferedReader(new InputStreamReader(url.openStream()));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = reader.readLine()) != null) sb.append(line);
                          reader.close();
                          result = sb.toString();
                      } catch (Exception e) { e.printStackTrace(); }
                      
                      final String finalResult = result;
                      handler.post(() -> {
                          if (finalResult != null) {
                              try {
                                  if(finalResult.trim().startsWith("[")) {
                                      JSONArray array = new JSONArray(finalResult);
                                      for (int i = 0; i < array.length(); i++) {
                                          JSONObject obj = array.getJSONObject(i);
                                          appList.add("🚀 " + obj.optString("app_name", "New App"));
                                      }
                                  } else {
                                      JSONObject obj = new JSONObject(finalResult);
                                      appList.add("🚀 " + obj.optString("app_name", "Master Live App"));
                                  }
                                  adapter.notifyDataSetChanged();
                              } catch (Exception e) {
                                  appList.add("⚡ Factory Sync Active");
                                  adapter.notifyDataSetChanged();
                              }
                          } else {
                              appList.add("⚡ Connected to App Matrix");
                              adapter.notifyDataSetChanged();
                          }
                      });
                  });
                  
                  UnityAds.initialize(getApplicationContext(), "1346992390875", false, new IUnityAdsInitializationListener() {
                      @Override 
                      public void onInitializationComplete() {
                          FrameLayout layout = findViewById(R.id.banner_ad_view);
                          topBannerView = new BannerView(MainActivity.this, "Banner_Android", new UnityBannerSize(320, 50));
                          layout.addView(topBannerView);
                          topBannerView.load();
                      }
                      @Override public void onInitializationFailed(UnityAds.UnityAdsInitializationError err, String msg) {}
                  });
              }
          }
          EOF

      - name: 🔐 6. Create Fresh Security Keystore
        run: |
          keytool -genkey -v -keystore core/app/final_master.keystore -alias master_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "MasterAdmin2026" -keypass "MasterAdmin2026" -dname "CN=MasterFactory, OU=Cloud, O=Engine, L=Agra, S=UP, C=IN"

      - name: 🚀 7. Compile Single Master APK via Gradle Action
        run: |
          cd core
          gradle assembleRelease --no-daemon
          cd ..
          cp core/app/build/outputs/apk/release/app-release.apk docs/apks/Master_Factory_App.apk

      - name: 📤 8. Commit & Push Single Master APK to Cloud
        run: |
          git config --global user.name "NextGen-Automation-Bot"
          git config --global user.email "automation-bot@github.com"
          git add docs/
          git commit -m "🚀 Real Fixed Master APK Live [skip ci]" || exit 0
          git push origin main
          
