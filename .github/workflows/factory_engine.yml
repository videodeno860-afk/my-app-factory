name: ⚡ REAL SINGLE MASTER APK CLOUD ENGINE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_master_framework:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 1. Checkout Code
        uses: actions/checkout@v3

      - name: ☕ 2. Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 3. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🧠 4. Clean & Setup Assets
        run: |
          mkdir -p docs/apks docs/policies
          rm -rf core
          echo "APP_NAME=Universal Mega App Factory" >> $GITHUB_ENV

      - name: 🏗️ 5. Building Real Android Single Master Source
        run: |
          mkdir -p core/app/src/main/java/com/nextgen/masterfactory
          mkdir -p core/app/src/main/res/layout
          mkdir -p core/app/src/main/res/values
          mkdir -p core/gradle/wrapper

          echo "include ':app'" > core/settings.gradle
          
          cat << 'EOF' > core/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' > core/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat << 'EOF' > core/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.nextgen.masterfactory'
              compileSdk 34
              defaultConfig {
                  applicationId "com.factory.single_master_engine"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file("final_master.keystore")
                      storePassword "MasterAdmin2026"
                      keyAlias "master_alias"
                      keyPassword "MasterAdmin2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'com.unity3d.ads:unity-ads:4.9.2'
          }
          EOF

          cat << 'EOF' > core/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.microsoft.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#1A237E</color></resources>' > core/app/src/main/res/values/colors.xml
          echo '<resources><string name="app_name">Master App Factory</string><style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>' > core/app/src/main/res/values/strings.xml
          
          cat << 'EOF' > core/app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.microsoft.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/colorPrimary"
              android:padding="16dp">
              <TextView android:id="@+id/app_title" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🌐 MASTER ENGINE RUNNING" android:textSize="22sp" android:layout_centerInParent="true" android:textColor="#FFFFFF"/>
              <FrameLayout android:id="@+id/banner_ad_view" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" />
          </RelativeLayout>
          EOF

          cat << 'EOF' > core/app/src/main/java/com/nextgen/masterfactory/MainActivity.java
          package com.nextgen.masterfactory;
          import android.os.Bundle;
          import android.widget.FrameLayout;
          import androidx.appcompat.app.AppCompatActivity;
          import com.unity3d.ads.UnityAds;
          import com.unity3d.ads.IUnityAdsInitializationListener;
          import com.unity3d.services.ads.banner.BannerView;
          import com.unity3d.services.ads.banner.UnityBannerSize;

          public class MainActivity extends AppCompatActivity {
              private BannerView topBannerView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  UnityAds.initialize(getApplicationContext(), "1346992390875", false, new IUnityAdsInitializationListener() {
                      @Override 
                      public void onInitializationComplete() {
                          FrameLayout layout = findViewById(R.id.banner_ad_view);
                          topBannerView = new BannerView(MainActivity.this, "Banner_Android", new UnityBannerSize(320, 50));
                          layout.addView(topBannerView);
                          topBannerView.load();
                      }
                      @Override public void onInitializationFailed(UnityAds.UnityAdsInitializationError err, String msg) {}
                  });
              }
          }
          EOF

      - name: 🔐 6. Create Fresh Security Keystore
        run: |
          keytool -genkey -v -keystore core/app/final_master.keystore -alias master_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "MasterAdmin2026" -keypass "MasterAdmin2026" -dname "CN=MasterFactory, OU=Cloud, O=Engine, L=Agra, S=UP, C=IN"

      - name: 🚀 7. Compile Single Master APK
        run: |
          cd core
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
          cd ..
          cp core/app/build/outputs/apk/release/app-release.apk docs/apks/Master_Factory_App.apk

      - name: 📤 8. Commit & Push Single Master APK to Cloud
        run: |
          git config --global user.name "NextGen-Automation-Bot"
          git config --global user.email "automation-bot@github.com"
          git add docs/
          git commit -m "🚀 Real Master APK Compiled Successfully [skip ci]" || exit 0
          git push origin main
          
